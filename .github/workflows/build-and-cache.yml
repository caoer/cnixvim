name: "Build and push to niks3 cache"
# Builds the neovim package for every fleet platform and pushes the closure
# to the PUBLIC niks3 cache (cache.0xtau.com — R2 CDN, zero egress) so any
# downstream substitutes instead of rebuilding — no pull token needed
# (substituter + key are in this flake's nixConfig). NIKS3_TOKEN is the fleet
# niks3 API token (control plane https://niks3.0xtau.com on forge-nyc-2);
# niks3 token auth is all-or-nothing — no per-cache scoping (OIDC would fix
# this but needs server-side config). NAR bytes upload direct to R2 via
# presigned URLs (multipart for large NARs), so the CF-tunnel 100 MB
# request-body limit never applies — no NAR-size skip needed (unlike attic).
on:
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: "read"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: "x86_64-linux"
            runner: "ubuntu-latest"
          - system: "aarch64-linux"
            runner: "ubuntu-24.04-arm"
          - system: "aarch64-darwin"
            runner: "macos-latest"
    runs-on: "${{ matrix.runner }}"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@v3"
        with:
          extra-conf: |
            accept-flake-config = true
      - name: "Build"
        # neovim (workstation) + server (small-disk hosts) — server's closure
        # heavily overlaps neovim's, so the second build is mostly free.
        run: nix build .#packages.${{ matrix.system }}.neovim .#packages.${{ matrix.system }}.server -L
      - name: "Push closures to niks3 cache"
        env:
          NIKS3_TOKEN: "${{ secrets.NIKS3_TOKEN }}"
        run: |
          umask 077
          printf '%s' "$NIKS3_TOKEN" > "$RUNNER_TEMP/niks3-token"
          export NIKS3_AUTH_TOKEN_FILE="$RUNNER_TEMP/niks3-token"
          export NIKS3_SERVER_URL="https://niks3.0xtau.com"
          # Pinned to the same rev osfiles locks (nixpkgs' niks3 lags — 1.6.1
          # lacks --pin). Bump alongside the osfiles niks3 flake input.
          nix profile install github:Mic92/niks3/780939adecefc2f84be700a6f9ae1cc9385ad240#niks3
          # One push per root: --pin takes exactly one store path. Pins are
          # upserts — they shield the latest closure from the server's 30-day
          # GC even when this repo goes idle. The second push dedups against
          # the first (server skips already-present objects).
          niks3 push --pin "cnixvim-neovim-${{ matrix.system }}" ./result
          niks3 push --pin "cnixvim-server-${{ matrix.system }}" ./result-1
