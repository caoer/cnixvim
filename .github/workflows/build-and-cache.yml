name: "Build and push to attic cache"
# Builds the neovim package for every fleet platform and pushes the closure
# to the yul2 attic cache (attic-yul2.0xdao.app) so osfiles hosts substitute
# instead of rebuilding. ATTIC_TOKEN is a scoped pull+push token for the
# yul2 cache, minted on dev-yul2 via atticadm.
on:
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: "read"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: "x86_64-linux"
            runner: "ubuntu-latest"
          - system: "aarch64-linux"
            runner: "ubuntu-24.04-arm"
          - system: "aarch64-darwin"
            runner: "macos-latest"
    runs-on: "${{ matrix.runner }}"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false
      - uses: "DeterminateSystems/determinate-nix-action@v3"
        with:
          extra-conf: |
            accept-flake-config = true
      - name: "Build"
        run: nix build .#packages.${{ matrix.system }}.neovim -L
      - name: "Push closure to yul2 cache"
        env:
          ATTIC_TOKEN: "${{ secrets.ATTIC_TOKEN }}"
        run: |
          nix profile install nixpkgs#attic-client
          attic login yul2 https://attic-yul2.0xdao.app/ "$ATTIC_TOKEN"
          attic push yul2 ./result
